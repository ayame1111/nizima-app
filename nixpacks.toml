[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc", "gnumake"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = [
    "npm run build", 
    "cp -r .next/static .next/standalone/.next/", 
    "cp -r public .next/standalone/"
]

[start]
cmd = "npx prisma db push --accept-data-loss && export AUTH_TRUST_HOST=true && export AUTH_SECRET=${AUTH_SECRET:-$(openssl rand -base64 32)} && HOSTNAME=0.0.0.0 node .next/standalone/server.js"
